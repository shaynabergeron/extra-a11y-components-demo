name: Accessibility Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start local server
        run: npm run serve &

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:3000/autocomplete.html

      - name: Run Pa11y
        run: npm run pa11y
